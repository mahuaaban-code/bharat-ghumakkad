<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#FAF7F0; padding:24px; font-family:'Hind',sans-serif; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:16px; }
.motif { background:#F0EAD6; border-radius:6px; padding:14px; display:flex; flex-direction:column; align-items:center; gap:8px; }
.motif svg { display:block; }
.name { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#8C6E57; text-align:center; }
.border-strip { height:28px; width:100%; border-radius:4px; overflow:hidden; }
.label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#8C6E57; margin-bottom:8px; }
</style></head>
<body>

<div class="label">Bhil / Pithora Tribal Motifs — Jhabua, Madhya Pradesh</div>

<div class="grid">

  <!-- Dot cluster -->
  <div class="motif">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <rect width="56" height="56" fill="#F5EDD6"/>
      <!-- Dense dot field — signature Bhil style -->
      <g fill="#C0392B">
        <circle cx="8" cy="8" r="2.5"/><circle cx="18" cy="8" r="2.5"/><circle cx="28" cy="8" r="2.5"/><circle cx="38" cy="8" r="2.5"/><circle cx="48" cy="8" r="2.5"/>
        <circle cx="13" cy="16" r="2.5"/><circle cx="23" cy="16" r="2.5"/><circle cx="33" cy="16" r="2.5"/><circle cx="43" cy="16" r="2.5"/>
        <circle cx="8" cy="24" r="2.5"/><circle cx="18" cy="24" r="2.5"/><circle cx="28" cy="24" r="2.5"/><circle cx="38" cy="24" r="2.5"/><circle cx="48" cy="24" r="2.5"/>
        <circle cx="13" cy="32" r="2.5"/><circle cx="23" cy="32" r="2.5"/><circle cx="33" cy="32" r="2.5"/><circle cx="43" cy="32" r="2.5"/>
        <circle cx="8" cy="40" r="2.5"/><circle cx="18" cy="40" r="2.5"/><circle cx="28" cy="40" r="2.5"/><circle cx="38" cy="40" r="2.5"/><circle cx="48" cy="40" r="2.5"/>
        <circle cx="13" cy="48" r="2.5"/><circle cx="23" cy="48" r="2.5"/><circle cx="33" cy="48" r="2.5"/><circle cx="43" cy="48" r="2.5"/>
      </g>
    </svg>
    <div class="name">Dot Field</div>
  </div>

  <!-- Pithora horse -->
  <div class="motif">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <rect width="56" height="56" fill="#F5EDD6"/>
      <!-- Simple stylized Pithora horse -->
      <g fill="#C0392B" stroke="none">
        <!-- body -->
        <rect x="14" y="22" width="22" height="12" rx="4"/>
        <!-- neck -->
        <rect x="32" y="14" width="8" height="14" rx="3"/>
        <!-- head -->
        <rect x="36" y="10" width="10" height="8" rx="3"/>
        <!-- legs -->
        <rect x="15" y="33" width="4" height="12" rx="2"/>
        <rect x="21" y="33" width="4" height="12" rx="2"/>
        <rect x="27" y="33" width="4" height="10" rx="2"/>
        <rect x="33" y="33" width="4" height="10" rx="2"/>
        <!-- tail -->
        <path d="M14 28 Q6 22 8 16" stroke="#C0392B" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- eye -->
        <circle cx="43" cy="13" r="1.5" fill="#F5EDD6"/>
        <!-- dots on body -->
        <circle cx="19" cy="27" r="1.5" fill="#F5EDD6"/>
        <circle cx="25" cy="27" r="1.5" fill="#F5EDD6"/>
        <circle cx="31" cy="27" r="1.5" fill="#F5EDD6"/>
      </g>
    </svg>
    <div class="name">Pithora Horse</div>
  </div>

  <!-- Concentric diamonds -->
  <div class="motif">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <rect width="56" height="56" fill="#F5EDD6"/>
      <g fill="none" stroke-width="2">
        <polygon points="28,6 50,28 28,50 6,28" stroke="#3A7D44"/>
        <polygon points="28,12 44,28 28,44 12,28" stroke="#D4800A"/>
        <polygon points="28,18 38,28 28,38 18,28" stroke="#C0392B"/>
        <polygon points="28,22 34,28 28,34 22,28" stroke="#3A7D44"/>
      </g>
      <circle cx="28" cy="28" r="3" fill="#C0392B"/>
    </svg>
    <div class="name">Concentric Diamond</div>
  </div>

  <!-- Sun motif -->
  <div class="motif">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <rect width="56" height="56" fill="#F5EDD6"/>
      <circle cx="28" cy="28" r="10" fill="#D4800A"/>
      <circle cx="28" cy="28" r="6" fill="#F5EDD6"/>
      <circle cx="28" cy="28" r="3" fill="#D4800A"/>
      <!-- rays -->
      <g stroke="#D4800A" stroke-width="2.5" stroke-linecap="round">
        <line x1="28" y1="6" x2="28" y2="12"/>
        <line x1="28" y1="44" x2="28" y2="50"/>
        <line x1="6" y1="28" x2="12" y2="28"/>
        <line x1="44" y1="28" x2="50" y2="28"/>
        <line x1="12" y1="12" x2="16" y2="16"/>
        <line x1="40" y1="40" x2="44" y2="44"/>
        <line x1="44" y1="12" x2="40" y2="16"/>
        <line x1="12" y1="44" x2="16" y2="40"/>
      </g>
    </svg>
    <div class="name">Sun (Surya)</div>
  </div>

  <!-- Zigzag border -->
  <div class="motif">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <rect width="56" height="56" fill="#F5EDD6"/>
      <g stroke="#C0392B" stroke-width="2.5" fill="none" stroke-linejoin="round">
        <polyline points="0,14 7,7 14,14 21,7 28,14 35,7 42,14 49,7 56,14"/>
        <polyline points="0,28 7,21 14,28 21,21 28,28 35,21 42,28 49,21 56,28"/>
        <polyline points="0,42 7,35 14,42 21,35 28,42 35,35 42,42 49,35 56,42"/>
      </g>
    </svg>
    <div class="name">Zigzag (Lakir)</div>
  </div>

  <!-- Step well -->
  <div class="motif">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <rect width="56" height="56" fill="#F5EDD6"/>
      <g fill="none" stroke="#3A7D44" stroke-width="2">
        <rect x="4" y="4" width="48" height="48"/>
        <rect x="10" y="10" width="36" height="36"/>
        <rect x="16" y="16" width="24" height="24"/>
        <rect x="22" y="22" width="12" height="12"/>
        <rect x="26" y="26" width="4" height="4" fill="#3A7D44"/>
      </g>
    </svg>
    <div class="name">Step Well (Bowri)</div>
  </div>

  <!-- Fish scale / leaf repeat -->
  <div class="motif">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <rect width="56" height="56" fill="#F5EDD6"/>
      <g fill="none" stroke="#C0392B" stroke-width="1.8">
        <ellipse cx="14" cy="8" rx="7" ry="10"/>
        <ellipse cx="28" cy="8" rx="7" ry="10"/>
        <ellipse cx="42" cy="8" rx="7" ry="10"/>
        <ellipse cx="7" cy="22" rx="7" ry="10"/>
        <ellipse cx="21" cy="22" rx="7" ry="10"/>
        <ellipse cx="35" cy="22" rx="7" ry="10"/>
        <ellipse cx="49" cy="22" rx="7" ry="10"/>
        <ellipse cx="14" cy="36" rx="7" ry="10"/>
        <ellipse cx="28" cy="36" rx="7" ry="10"/>
        <ellipse cx="42" cy="36" rx="7" ry="10"/>
        <ellipse cx="7" cy="50" rx="7" ry="10"/>
        <ellipse cx="21" cy="50" rx="7" ry="10"/>
        <ellipse cx="35" cy="50" rx="7" ry="10"/>
        <ellipse cx="49" cy="50" rx="7" ry="10"/>
      </g>
    </svg>
    <div class="name">Leaf Scale</div>
  </div>

  <!-- Cross / star motif -->
  <div class="motif">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <rect width="56" height="56" fill="#F5EDD6"/>
      <!-- 4x4 grid of cross motifs -->
      <g fill="#D4800A">
        <g transform="translate(8,8)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(22,8)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(36,8)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(50,8)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(8,22)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(22,22)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(36,22)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(50,22)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(8,36)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(22,36)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(36,36)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(50,36)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(8,50)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(22,50)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(36,50)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
        <g transform="translate(50,50)">
          <rect x="-1" y="-5" width="2" height="10"/>
          <rect x="-5" y="-1" width="10" height="2"/>
          <circle cx="0" cy="0" r="2"/>
        </g>
      </g>
    </svg>
    <div class="name">Cross/Star Grid</div>
  </div>

</div>

<!-- Border divider strip -->
